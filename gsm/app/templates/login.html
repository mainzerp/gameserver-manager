<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GameServer Manager</title>
    <script nonce="{{ request.state.csp_nonce }}">
        (function(){
            var t = localStorage.getItem('gsm_theme');
            if (t === 'light') document.documentElement.classList.remove('dark');
        })();
    </script>
    <!-- Self-hosted fonts -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <!-- Tailwind CSS (compiled) -->
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <style>
        /* ===== CSS Custom Properties: Light Mode ===== */
        :root {
            --clr-bg: #f5f2ee;
            --clr-panel: #ffffff;
            --clr-panel-hover: #f5f2ee;
            --clr-input: #f5f2ee;
            --clr-border: #d5d0ca;
            --clr-border-hover: #c4923f;
            --clr-text-primary: #1a1816;
            --clr-text-secondary: #3d3935;
            --clr-text-muted: #5a5550;
            --clr-text-inverse: #0d0c0a;
            --clr-accent: #c4923f;
            --clr-accent-hover: #d4a045;
            --clr-accent-subtle: rgba(196, 146, 63, 0.12);
            --clr-accent-glow: rgba(196, 146, 63, 0.30);
            --clr-danger: #b8635a;
            --clr-danger-bg: rgba(184, 99, 90, 0.12);
            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        html.dark {
            --clr-bg: #0d0c0a;
            --clr-panel: #151512;
            --clr-panel-hover: #1a1816;
            --clr-input: #0d0c0a;
            --clr-border: #2e2b28;
            --clr-border-hover: #e2a84b;
            --clr-text-primary: #f5f2ee;
            --clr-text-secondary: #d5d0ca;
            --clr-text-muted: #8a8580;
            --clr-text-inverse: #0d0c0a;
            --clr-accent: #e2a84b;
            --clr-accent-hover: #f5c26b;
            --clr-accent-subtle: rgba(226, 168, 75, 0.12);
            --clr-accent-glow: rgba(226, 168, 75, 0.35);
            --clr-danger: #d4756b;
            --clr-danger-bg: rgba(212, 117, 107, 0.12);
        }

        * {
            transition: color var(--transition-fast), background-color var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--clr-text-primary);
            background: var(--clr-bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        /* Atmospheric background grid */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 30% 20%, var(--clr-accent-subtle) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(143, 180, 204, 0.06) 0%, transparent 35%),
                linear-gradient(180deg, var(--clr-bg) 0%, var(--clr-panel-hover) 100%);
        }

        html.dark .login-bg {
            background:
                radial-gradient(circle at 30% 20%, rgba(226, 168, 75, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(143, 180, 204, 0.04) 0%, transparent 35%),
                linear-gradient(180deg, #0d0c0a 0%, #12110f 100%);
        }

        .login-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--clr-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--clr-border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
            -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 75%);
        }

        /* Card */
        .login-card {
            background: var(--clr-panel);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast), transform var(--transition-fast);
        }

        html.dark .login-card {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        .login-card:hover {
            border-color: var(--clr-border-hover);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12), 0 0 24px var(--clr-accent-glow);
        }

        /* Inputs */
        .input-field {
            background: var(--clr-input);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 14px;
            color: var(--clr-text-primary);
            outline: none;
            width: 100%;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .input-field:focus {
            border-color: var(--clr-accent);
            box-shadow: 0 0 0 3px var(--clr-accent-subtle);
        }

        .input-field::placeholder { color: var(--clr-text-muted); }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            color: var(--clr-text-secondary);
        }

        /* Buttons */
        .btn-primary {
            background: var(--clr-accent);
            color: var(--clr-text-inverse);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all var(--transition-fast);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .btn-primary:hover {
            background: var(--clr-accent-hover);
            box-shadow: 0 0 16px var(--clr-accent-glow);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--clr-border);
            color: var(--clr-text-secondary);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-secondary:hover {
            border-color: var(--clr-accent);
            background: var(--clr-accent-subtle);
            color: var(--clr-accent);
        }

        .brand-glow {
            filter: drop-shadow(0 0 8px var(--clr-accent-glow));
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="login-bg">
        <div class="login-grid"></div>
    </div>

    <div class="w-full max-w-sm animate-fade-in">
        <div class="text-center mb-8">
            <svg class="w-12 h-12 mx-auto mb-3 brand-glow" style="color: var(--clr-accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 0 00-2-2m-2-4h.01M17 16h.01"/>
            </svg>
            <h1 class="text-2xl font-bold tracking-tight" style="color: var(--clr-text-primary);">GameServer Manager</h1>
            <p class="text-sm mt-1" style="color: var(--clr-text-muted);">Command Center</p>
        </div>

        <div class="login-card p-6">
            {% if error %}
            <div class="text-sm rounded-lg px-4 py-3 mb-4 animate-fade-in" style="background: var(--clr-danger-bg); color: var(--clr-danger); border: 1px solid rgba(212, 117, 107, 0.25);">
                {% if error == "invalid" %}
                {{ _("Invalid username or password.") }}
                {% else %}
                {{ error }}
                {% endif %}
            </div>
            {% endif %}

            <form action="/login" method="post" class="space-y-4">
                <div>
                    <label class="input-label" for="username">{{ _("Username") }}</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="input-field" placeholder="{{ _("Enter your username") }}">
                </div>
                <div>
                    <label class="input-label" for="password">{{ _("Password") }}</label>
                    <input type="password" id="password" name="password" required
                        class="input-field" placeholder="{{ _("Enter your password") }}">
                </div>
                <button type="submit" class="btn-primary w-full">
                    {{ _("Sign In") }}
                </button>
            </form>

            {% if webauthn_available %}
            <div class="mt-4 pt-4" style="border-top: 1px solid var(--clr-border);">
                <button id="passkey-btn" data-action="loginWithPasskey"
                    class="btn-secondary w-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                    Sign in with Passkey
                </button>
                <p id="passkey-status" class="text-xs text-center mt-2 hidden" style="color: var(--clr-text-muted);"></p>
            </div>
            {% endif %}
        </div>
    </div>
</body>

{% if webauthn_available %}
<script nonce="{{ request.state.csp_nonce }}">
async function loginWithPasskey() {
    const btn = document.getElementById('passkey-btn');
    const status = document.getElementById('passkey-status');
    btn.disabled = true;
    status.textContent = 'Requesting options...';
    status.classList.remove('hidden');
    try {
        const optResp = await fetch('/auth/webauthn/login/options');
        if (!optResp.ok) { throw new Error('Failed to get options'); }
        const options = await optResp.json();
        options.challenge = base64urlToBuffer(options.challenge);
        if (options.allowCredentials) {
            options.allowCredentials = options.allowCredentials.map(c => ({
                ...c, id: base64urlToBuffer(c.id)
            }));
        }
        status.textContent = 'Please complete the passkey gesture...';
        const assertion = await navigator.credentials.get({publicKey: options});
        const payload = {
            id: assertion.id,
            rawId: bufferToBase64url(assertion.rawId),
            type: assertion.type,
            response: {
                clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                signature: bufferToBase64url(assertion.response.signature),
                userHandle: assertion.response.userHandle ? bufferToBase64url(assertion.response.userHandle) : null,
            }
        };
        const verResp = await fetch('/auth/webauthn/login/complete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
        });
        const result = await verResp.json();
        if (result.ok) {
            window.location.href = result.redirect || '/';
        } else {
            status.textContent = 'Authentication failed: ' + (result.error || 'Unknown error');
            btn.disabled = false;
        }
    } catch (e) {
        status.textContent = 'Error: ' + e.message;
        btn.disabled = false;
    }
}
function base64urlToBuffer(b) {
    const s = b.replace(/-/g, '+').replace(/_/g, '/');
    const bin = atob(s);
    const buf = new ArrayBuffer(bin.length);
    const view = new Uint8Array(buf);
    for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
    return buf;
}
function bufferToBase64url(buf) {
    const bytes = new Uint8Array(buf);
    let s = '';
    for (let b of bytes) s += String.fromCharCode(b);
    return btoa(s).replace(/+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
</script>
{% endif %}
</html>
