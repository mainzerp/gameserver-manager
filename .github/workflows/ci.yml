name: CI

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r gsm/requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint
        run: ruff check gsm/app gsm/main.py

      - name: Test
        run: pytest gsm/tests/ -q

      - name: Check single Alembic head
        run: |
          cd gsm
          alembic heads | tee /tmp/alembic_heads.txt
          # There must be exactly one head revision.
          head_count=$(grep -c "^[a-f0-9]" /tmp/alembic_heads.txt || true)
          echo "Head count: $head_count"
          test "$head_count" -eq 1

      - name: Migration sanity check (SQLite)
        # Best-effort: verifies init_db() can run the full migration chain
        # on a throwaway SQLite database. May fail on SQLite due to a
        # pre-existing PostgreSQL-only statement in migration b7_01
        # (DROP COLUMN IF EXISTS). The single-head check above is the
        # authoritative guard against branched migrations.
        continue-on-error: true
        run: |
          cd gsm
          GSM_SECRET_KEY="ci-test-key-not-for-prod" \
          GSM_DATABASE_URL="sqlite:///./ci_migrate_check.db" \
          python -c "import asyncio; from app.database import init_db; asyncio.run(init_db())"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit scan
        run: bandit -r gsm/app -ll -ii || true

      - name: Dependency audit
        run: pip-audit -r gsm/requirements.txt || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./gsm
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
